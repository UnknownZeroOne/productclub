<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Auth | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #F1F5F9; /* softer white */
            --text-secondary: #94A3B8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19; /* voting theme */
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .login-card {
            background-color: #151A2A;
            padding: 3.5rem 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2F374A;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(200px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(236, 72, 153, 0.25), transparent 80%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 0;
        }
        .login-card:hover::before {
            opacity: 1;
        }
        .card-content {
            position: relative;
            z-index: 1;
        }
        .meta-logo {
            width: 150px;
            margin-bottom: 1.5rem;
            filter: brightness(0) invert(1);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 500;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        input {
            padding: 1rem;
            border-radius: 8px;
            background-color: #0B0F19;
            border: 1px solid #2F374A;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus {
            border-color: #a855f7;
        }
        button {
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: #FFFFFF;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(236,72,153,0.3);
        }
        .disclaimer {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta Logo" class="meta-logo" style="opacity: 0.85;">
            <h2>Authentication Required</h2>
            <form id="meta-login-form">
                <input type="email" placeholder="Email or Phone Number" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Log in to Vote</button>
                <div class="disclaimer" style="color: var(--text-secondary);">Securely connects to Product Club via Meta to record your singular vote.</div>
            </form>
        </div>
    </div>

    <script>
        // Form Logic
        document.getElementById('meta-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Set fake auth token
            localStorage.setItem('metaAuth', 'true');
            // Redirect back to main page
            window.location.href = 'index.html';
        });

        // Mouse Spotlight Hover effect
        const card = document.querySelector('.login-card');
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });
    </script>
</body>
</html>
